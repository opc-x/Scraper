name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: opc-x/scraper

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete old container
        run: az container delete --resource-group scraper-rg --name scraper --yes 2>/dev/null || true

      - name: Deploy to ACI
        env:
          DB_URL: ${{ secrets.DATABASE_URL }}
          OAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          OAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          az container create \
            --resource-group scraper-rg \
            --name scraper \
            --image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --cpu 1 \
            --memory 2 \
            --ports 80 \
            --ip-address Public \
            --location southeastasia \
            --os-type Linux \
            --secure-environment-variables \
              "DATABASE_URL=$DB_URL" \
              "OPENAI_API_KEY=$OAI_KEY" \
            --environment-variables \
              "OPENAI_MODEL=$OAI_MODEL" \
            --restart-policy OnFailure \
            --dns-name-label scraper-app

      - name: Update Cloudflare DNS
        run: |
          NEW_IP=$(az container show --resource-group scraper-rg --name scraper --query "ipAddress.ip" --output tsv)
          RECORD_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records?name=scraper.opc-x.org" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/${RECORD_ID}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"scraper\",\"content\":\"${NEW_IP}\",\"ttl\":1,\"proxied\":false}"
