<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scraper — 多渠道职位狙击</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  h1 span { color: #22c55e; }
  .subtitle { color: #737373; font-size: 14px; margin-bottom: 32px; }
  .search-box { background: #171717; border: 1px solid #262626; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .row { display: flex; gap: 12px; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  input, select { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #e5e5e5; font-size: 14px; flex: 1; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: #22c55e; }
  select { cursor: pointer; }
  button { background: #22c55e; color: #0a0a0a; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .stats { display: flex; gap: 24px; margin-bottom: 24px; }
  .stat { background: #171717; border: 1px solid #262626; border-radius: 10px; padding: 16px 20px; flex: 1; }
  .stat-label { color: #737373; font-size: 12px; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-value.green { color: #22c55e; }
  .job-list { display: flex; flex-direction: column; gap: 12px; }
  .job-card { background: #171717; border: 1px solid #262626; border-radius: 10px; padding: 18px 20px; transition: border-color 0.2s; }
  .job-card:hover { border-color: #404040; }
  .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .job-title { font-size: 16px; font-weight: 600; }
  .job-salary { color: #22c55e; font-weight: 700; font-size: 15px; white-space: nowrap; margin-left: 12px; }
  .job-company { color: #a3a3a3; font-size: 13px; margin-bottom: 8px; }
  .job-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { background: #262626; color: #a3a3a3; padding: 3px 10px; border-radius: 4px; font-size: 12px; }
  .tag.skill { border: 1px solid #333; color: #d4d4d4; }
  .job-actions { display: flex; justify-content: flex-end; margin-top: 10px; gap: 8px; }
  .btn-sm { font-size: 12px; padding: 5px 14px; border-radius: 6px; }
  .btn-outline { background: transparent; border: 1px solid #333; color: #a3a3a3; }
  .btn-outline:hover { border-color: #22c55e; color: #22c55e; }
  .empty { text-align: center; color: #525252; padding: 60px 0; font-size: 14px; }
  .loading { text-align: center; padding: 40px 0; color: #737373; }
  .loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: #22c55e; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1><span>Scraper</span> 多渠道职位狙击</h1>
  <p class="subtitle">输入条件 → 实时抓取 → AI 归一化 → 精准命中</p>

  <div class="search-box">
    <div class="row">
      <input id="keyword" type="text" placeholder="关键词：前端、Python、产品经理..." autofocus>
      <select id="city">
        <option value="">全国</option>
        <option value="深圳">深圳</option>
        <option value="北京">北京</option>
        <option value="上海">上海</option>
        <option value="广州">广州</option>
        <option value="杭州">杭州</option>
        <option value="成都">成都</option>
        <option value="南京">南京</option>
        <option value="武汉">武汉</option>
        <option value="西安">西安</option>
        <option value="长沙">长沙</option>
        <option value="重庆">重庆</option>
        <option value="苏州">苏州</option>
        <option value="厦门">厦门</option>
      </select>
      <select id="channel">
        <option value="boss">BOSS直聘</option>
        <option value="liepin" disabled>猎聘 (即将接入)</option>
        <option value="zhilian" disabled>智联 (即将接入)</option>
      </select>
    </div>
    <div class="row">
      <input id="salary_min" type="number" placeholder="最低月薪 (K)" style="flex:0.5">
      <button id="fire" onclick="doSearch()">🎯 狙击</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">命中职位</div>
      <div class="stat-value green" id="total">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">当前渠道</div>
      <div class="stat-value" id="ch">BOSS直聘</div>
    </div>
    <div class="stat">
      <div class="stat-label">耗时</div>
      <div class="stat-value" id="elapsed">—</div>
    </div>
  </div>

  <div id="results" class="job-list">
    <div class="empty">输入关键词，点击狙击 🎯</div>
  </div>
</div>

<script>
async function doSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) return;

  const btn = document.getElementById('fire');
  btn.disabled = true;
  document.getElementById('results').innerHTML = '<div class="loading">正在狙击目标...</div>';

  const body = {
    keyword,
    city: document.getElementById('city').value,
    channel: document.getElementById('channel').value,
    salary_min: parseInt(document.getElementById('salary_min').value) || null,
  };
  if (body.salary_min) body.salary_min *= 1000;

  const t0 = Date.now();
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    const ms = Date.now() - t0;

    document.getElementById('total').textContent = data.total;
    document.getElementById('elapsed').textContent = (ms / 1000).toFixed(1) + 's';

    if (!data.jobs.length) {
      document.getElementById('results').innerHTML = '<div class="empty">没有命中，换个关键词试试</div>';
      return;
    }

    document.getElementById('results').innerHTML = data.jobs.map(j => `
      <div class="job-card">
        <div class="job-header">
          <span class="job-title">${esc(j.title)}</span>
          <span class="job-salary">${esc(j.salary)}</span>
        </div>
        <div class="job-company">${esc(j.company)} · ${esc(j.city)} · ${esc(j.experience)}</div>
        <div class="job-meta">
          ${j.skills.map(s => `<span class="tag skill">${esc(s)}</span>`).join('')}
          <span class="tag">${esc(j.education)}</span>
        </div>
        <div class="job-actions">
          <a href="${esc(j.url)}" target="_blank"><button class="btn-sm btn-outline">查看原文</button></a>
          <button class="btn-sm" onclick="saveJob(this, ${esc(JSON.stringify(JSON.stringify(j)))})">⭐ 收藏</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="empty">请求失败: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

async function saveJob(el, jobJson) {
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: jobJson,
    });
    if (res.ok) {
      el.textContent = '✅ 已收藏';
      el.disabled = true;
    } else {
      const d = await res.json();
      el.textContent = d.detail === 'Job already saved' ? '✅ 已收藏' : '❌ 失败';
    }
  } catch { el.textContent = '❌ 失败'; }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

document.getElementById('keyword').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
</body>
</html>
