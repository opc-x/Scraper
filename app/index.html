<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scraper">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Scraper</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #0a0a0a;
  --bg2: #141414;
  --bg3: #1c1c1c;
  --border: #2a2a2a;
  --text: #e5e5e5;
  --text2: #888;
  --text3: #555;
  --green: #22c55e;
  --green-dim: #052e16;
  --amber: #f59e0b;
  --red: #ef4444;
  --blue: #0088cc;
  --radius: 14px;
  --nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif; }

/* ── Layout ── */
.screen { display: none; flex-direction: column; height: 100dvh; overflow: hidden; }
.screen.active { display: flex; }
.screen-body { flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px); }
.screen-body::-webkit-scrollbar { display: none; }

/* ── Top bar ── */
.topbar { padding: 16px 16px 8px; padding-top: calc(env(safe-area-inset-top, 12px) + 12px); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar-title { font-size: 22px; font-weight: 700; }
.topbar-title span { color: var(--green); }
.topbar-sub { font-size: 12px; color: var(--text3); }

/* ── Bottom nav ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--nav-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: rgba(10,10,10,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; z-index: 50; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; transition: color 0.15s; color: var(--text3); border: none; background: none; }
.nav-item.active { color: var(--green); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

/* ── Cards ── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.card:last-child { margin-bottom: 0; }

/* ── Search form ── */
.search-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.search-row { display: flex; gap: 8px; margin-bottom: 8px; }
.search-row:last-child { margin-bottom: 0; }
input, select, textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-size: 15px;
  flex: 1;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--green); }
.btn-fire {
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 11px 20px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
.btn-fire:disabled { opacity: 0.4; }

/* ── Stats row ── */
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.stat-val { font-size: 20px; font-weight: 700; color: var(--green); }
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ── Job card ── */
.job-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.job-card:active { background: var(--bg3); }
.job-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.job-title { font-size: 16px; font-weight: 600; line-height: 1.3; flex: 1; margin-right: 8px; }
.job-salary { color: var(--green); font-weight: 700; font-size: 14px; white-space: nowrap; }
.job-company { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.tag { background: var(--bg3); color: var(--text2); padding: 3px 8px; border-radius: 6px; font-size: 11px; border: 1px solid var(--border); }
.job-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
.btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-star { background: var(--bg3); color: var(--amber); border: 1px solid var(--border); }

/* ── Empty / loading ── */
.empty { text-align: center; color: var(--text3); padding: 60px 20px; font-size: 14px; }
.spin { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.center-spin { display: flex; justify-content: center; padding: 40px 0; }

/* ── Saved list ── */
.saved-empty { text-align: center; color: var(--text3); padding: 60px 20px; }

/* ── Channel config ── */
.ch-pick { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.15s; }
.ch-pick:active { background: var(--bg3); }
.ch-pick-info { flex: 1; }
.ch-pick-name { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.ch-pick-desc { font-size: 12px; color: var(--text3); }
.ch-pick-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
.badge.active { background: var(--green-dim); color: var(--green); }
.badge.missing { background: #422006; color: var(--amber); }
.badge.off { background: var(--bg3); color: var(--text3); }
.ch-arrow { color: var(--text3); font-size: 16px; }

/* ── Channel detail ── */
.detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.btn-back { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 4px; }
.detail-title { font-size: 20px; font-weight: 700; }
.field-group { margin-bottom: 14px; }
.field-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.field-label .req { color: var(--red); }
.field-help { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 1.4; }
.ch-footer-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; margin-top: 16px; border-top: 1px solid var(--border); }
.toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.toggle input { display: none; }
.toggle-track { width: 44px; height: 26px; background: var(--border); border-radius: 13px; position: relative; transition: background 0.2s; }
.toggle-track::after { content: ''; position: absolute; width: 20px; height: 20px; background: var(--text3); border-radius: 50%; top: 3px; left: 3px; transition: all 0.2s; }
.toggle input:checked + .toggle-track { background: var(--green); }
.toggle input:checked + .toggle-track::after { left: 21px; background: #fff; }
.toggle-label { font-size: 14px; color: var(--text2); }
.btn-save { background: var(--green); color: #000; border: none; border-radius: 10px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
.toast { font-size: 12px; }
.toast.ok { color: var(--green); }
.toast.err { color: var(--red); }

/* ── Telegram accounts ── */
.tg-section { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-top: 16px; }
.tg-section-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
.acct-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
.acct-info { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.acct-name { font-weight: 600; }
.acct-phone { color: var(--text3); font-size: 12px; }
.acct-btns { display: flex; gap: 6px; }
.btn-login { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-del { background: #7f1d1d; color: #fca5a5; border: none; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.g { background: var(--green); }
.dot.r { background: var(--red); }
.add-acct-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.add-acct-form input { font-size: 13px; padding: 9px 12px; }
.add-acct-form .btn-full { grid-column: 1/-1; }
.btn-full { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.login-box { margin-top: 8px; margin-bottom: 8px; padding: 10px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--border); }
.login-row { display: flex; gap: 8px; margin-bottom: 8px; }
.login-row:last-child { margin-bottom: 0; }
.login-row input { font-size: 13px; padding: 9px 12px; }
.btn-code { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* ── Country/city selector ── */
.city-chips { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 6px; scrollbar-width: none; margin-top: 8px; }
.city-chips::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 13px; border: 1px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.chip.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }

/* ── Telegram ops ── */
.tg-ops-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.tg-ops-acct { display: flex; align-items: center; gap: 8px; }
.tg-ops-name { font-size: 16px; font-weight: 700; }
.tg-ops-phone { font-size: 12px; color: var(--text3); }
.btn-config-sm { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
.tg-search { display: flex; gap: 8px; margin-bottom: 12px; }
.tg-search input { flex: 1; font-size: 14px; }
.btn-search-go { background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.tg-section-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
/* dialog list */
.dialog-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; }
.dialog-item:active { background: var(--bg3); }
.dialog-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.dialog-info { flex: 1; min-width: 0; }
.dialog-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dialog-preview { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.dialog-right { flex-shrink: 0; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.dialog-type { font-size: 10px; color: var(--text3); background: var(--bg3); padding: 2px 6px; border-radius: 4px; }
.dialog-unread { background: var(--green); color: #000; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
/* search results inline */
.sr-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
.sr-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
.sr-info { flex: 1; min-width: 0; }
.sr-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sr-sub { font-size: 12px; color: var(--text3); }
.btn-into { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.btn-into:hover { border-color: var(--green); color: var(--green); }
/* chat / message view */
.chat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.btn-back-chat { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; padding: 0 4px 0 0; line-height: 1; }
.chat-title { font-size: 17px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-filter { display: flex; gap: 8px; margin-bottom: 10px; }
.chat-filter input { flex: 1; font-size: 13px; }
.btn-filter { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 10px; padding: 10px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.btn-ai { background: var(--green); color: #000; border: none; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.msg-item { padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; color: var(--text); }
.msg-item.media-only { color: var(--text3); border-style: dashed; }
.msg-sender { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; cursor: pointer; }
.msg-sender:hover .sender-name { text-decoration: underline; }
.sender-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sender-name { font-size: 12px; font-weight: 600; color: var(--green); }
.sender-at { font-size: 11px; color: var(--text3); }
.msg-text { font-size: 13px; line-height: 1.6; }
.msg-media { font-size: 12px; color: var(--text3); }

/* ── Modal for config ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; }
.modal-overlay.show { display: block; }
.modal-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-radius: 20px 20px 0 0; max-height: 92dvh; overflow-y: auto; padding: 0 0 calc(var(--safe-bottom) + 16px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
.modal-overlay.show .modal-sheet { transform: translateY(0); }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-body { padding: 16px; }
</style>
</head>
<body>

<!-- ══ Screen: 狙击 ══ -->
<div class="screen active" id="screen-search">
  <div class="topbar">
    <div>
      <div class="topbar-title"><span>Scraper</span></div>
      <div class="topbar-sub">多渠道职位狙击</div>
    </div>
  </div>
  <div class="screen-body">
    <div class="search-card">
      <div class="search-row">
        <input id="keyword" type="text" placeholder="关键词：前端、Python..." inputmode="search">
      </div>
      <div class="search-row">
        <select id="country" style="flex:1" onchange="onCountryChange()">
          <option value="cn">🇨🇳 中国</option>
          <option value="th">🇹🇭 泰国</option>
          <option value="sg">🇸🇬 新加坡</option>
          <option value="my">🇲🇾 马来西亚</option>
          <option value="us">🇺🇸 美国</option>
          <option value="remote">🌏 远程/全球</option>
        </select>
        <select id="channel" style="flex:1"></select>
      </div>
      <div class="city-chips" id="city-chips"></div>
      <div class="search-row">
        <input id="salary_min" type="number" placeholder="最低月薪 (K)" inputmode="numeric">
        <button class="btn-fire" id="fire" onclick="doSearch()">🎯 狙击</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" id="total">—</div><div class="stat-lbl">命中职位</div></div>
      <div class="stat-card"><div class="stat-val" id="ch-stat" style="font-size:13px;margin-top:4px">—</div><div class="stat-lbl">渠道</div></div>
      <div class="stat-card"><div class="stat-val" id="elapsed">—</div><div class="stat-lbl">耗时</div></div>
    </div>

    <div id="results"><div class="empty">输入关键词，点击狙击 🎯</div></div>
  </div>
</div>

<!-- ══ Screen: 收藏 ══ -->
<div class="screen" id="screen-saved">
  <div class="topbar">
    <div class="topbar-title">⭐ 收藏</div>
  </div>
  <div class="screen-body">
    <div id="saved-list"><div class="center-spin"><div class="spin"></div></div></div>
  </div>
</div>

<!-- ══ Screen: 渠道 ══ -->
<div class="screen" id="screen-config">
  <div class="topbar">
    <div class="topbar-title" id="config-title">渠道</div>
  </div>
  <div class="screen-body" id="config-body">
    <div class="center-spin"><div class="spin"></div></div>
  </div>
</div>

<!-- ══ Bottom Nav ══ -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-search" onclick="switchTab('search')">
    <span class="nav-icon">🎯</span>
    <span class="nav-label">狙击</span>
  </button>
  <button class="nav-item" id="nav-saved" onclick="switchTab('saved')">
    <span class="nav-icon">⭐</span>
    <span class="nav-label">收藏</span>
  </button>
  <button class="nav-item" id="nav-config" onclick="switchTab('config')">
    <span class="nav-icon">📡</span>
    <span class="nav-label">渠道</span>
  </button>
</nav>

<script>
// ══ PWA ══
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// ══ Tab switching ══
const TABS = ['search', 'saved', 'config'];
function switchTab(tab) {
  TABS.forEach(t => {
    document.getElementById(`screen-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`nav-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'saved') loadSaved();
  if (tab === 'config') showChannelPicker();
}

// ══ Country / City ══
const COUNTRY_CITIES = {
  cn: ['全国','北京','上海','深圳','广州','杭州','成都','南京','武汉','西安','长沙','重庆','苏州','厦门'],
  th: ['全国','曼谷','清迈','芭提雅','普吉'],
  sg: ['新加坡'],
  my: ['全国','吉隆坡','槟城','新山'],
  us: ['全国','旧金山','纽约','西雅图','洛杉矶','奥斯汀'],
  remote: ['全球远程'],
};
let _selectedCity = '';

function onCountryChange() {
  const country = document.getElementById('country').value;
  const cities = COUNTRY_CITIES[country] || [];
  _selectedCity = cities[0] || '';
  renderCityChips(cities);
}

function renderCityChips(cities) {
  const el = document.getElementById('city-chips');
  el.innerHTML = cities.map((c, i) =>
    `<span class="chip ${i === 0 ? 'active' : ''}" onclick="selectCity(this, '${c}')">${c}</span>`
  ).join('');
}

function selectCity(el, city) {
  document.querySelectorAll('#city-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  _selectedCity = city;
}

// 初始化城市 chips
onCountryChange();

// ══ Channel select init ══
const STATUS_LABEL = { active: '已就绪', missing_config: '待配置', disabled: '未启用' };
let _schema = null, _cfgs = null;

async function loadChannels() {
  try {
    const res = await fetch('/api/channels');
    const data = await res.json();
    const sel = document.getElementById('channel');
    sel.innerHTML = '';
    data.channels.forEach(ch => {
      const o = document.createElement('option');
      o.value = ch.id;
      o.textContent = ch.name;
      if (ch.status !== 'active') { o.disabled = true; o.textContent += ch.status === 'missing_config' ? ' (待配置)' : ' (未启用)'; }
      sel.appendChild(o);
    });
    const active = data.channels.find(c => c.status === 'active');
    if (active) { sel.value = active.id; document.getElementById('ch-stat').textContent = active.name; }
  } catch {}
}
loadChannels();

// ══ Search ══
async function doSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) return;
  const btn = document.getElementById('fire');
  btn.disabled = true;
  document.getElementById('results').innerHTML = '<div class="center-spin"><div class="spin"></div></div>';
  const chOpt = document.getElementById('channel').selectedOptions[0];
  document.getElementById('ch-stat').textContent = chOpt?.textContent?.replace(/ \(.*\)/, '') || '—';
  const city = _selectedCity === '全国' || _selectedCity === '全球远程' ? '' : _selectedCity;
  const body = { keyword, city, channel: document.getElementById('channel').value, salary_min: parseInt(document.getElementById('salary_min').value) || null };
  if (body.salary_min) body.salary_min *= 1000;
  const t0 = Date.now();
  try {
    const res = await fetch('/api/search', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
    document.getElementById('total').textContent = data.total;
    document.getElementById('elapsed').textContent = ((Date.now() - t0) / 1000).toFixed(1) + 's';
    document.getElementById('results').innerHTML = data.jobs.length
      ? data.jobs.map(jobCard).join('')
      : '<div class="empty">没有命中，换个关键词试试</div>';
  } catch (e) { document.getElementById('results').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
  finally { btn.disabled = false; }
}

function jobCard(j) {
  return `<div class="job-card">
    <div class="job-head"><div class="job-title">${esc(j.title)}</div><div class="job-salary">${esc(j.salary)}</div></div>
    <div class="job-company">${esc(j.company)}${j.city ? ' · ' + esc(j.city) : ''}${j.experience ? ' · ' + esc(j.experience) : ''}</div>
    ${(j.skills||[]).length ? `<div class="tags">${j.skills.slice(0,4).map(s => `<span class="tag">${esc(s)}</span>`).join('')}</div>` : ''}
    <div class="job-actions">
      ${j.url ? `<a href="${esc(j.url)}" target="_blank"><button class="btn-sm btn-ghost">查看原文</button></a>` : ''}
      <button class="btn-sm btn-star" onclick="saveJob(this, ${esc(JSON.stringify(JSON.stringify(j)))})">⭐ 收藏</button>
    </div>
  </div>`;
}

async function saveJob(el, jobJson) {
  try {
    const res = await fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: jobJson });
    el.textContent = res.ok ? '✅ 已收藏' : ((await res.json()).detail === 'Job already saved' ? '✅ 已收藏' : '❌ 失败');
    el.disabled = true;
  } catch { el.textContent = '❌ 失败'; }
}

// ══ Saved jobs ══
async function loadSaved() {
  const el = document.getElementById('saved-list');
  el.innerHTML = '<div class="center-spin"><div class="spin"></div></div>';
  try {
    const res = await fetch('/api/saved');
    const data = await res.json();
    if (!data.jobs.length) { el.innerHTML = '<div class="saved-empty">暂无收藏</div>'; return; }
    el.innerHTML = data.jobs.map(j => {
      const job = { title: j.title, company: j.company, salary: j.salary, city: j.city, experience: j.experience, skills: j.skills || [], url: j.url || '', education: j.education || '' };
      return jobCard(job);
    }).join('');
  } catch (e) { el.innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

// ══ Channel config — Step 1: picker ══
async function showChannelPicker() {
  document.getElementById('config-title').textContent = '渠道';
  const body = document.getElementById('config-body');
  body.innerHTML = '<div class="center-spin"><div class="spin"></div></div>';
  try {
    const [sr, cr] = await Promise.all([fetch('/api/channels/schema').then(r=>r.json()), fetch('/api/channels/config').then(r=>r.json())]);
    _schema = sr.schema; _cfgs = cr.channels;
    body.innerHTML = Object.entries(_schema).map(([id, s]) => {
      const cfg = _cfgs[id] || {};
      const en = cfg.enabled ?? false;
      const filled = s.fields.filter(f=>f.required).every(f=>!!cfg[f.key]);
      const status = en && filled ? 'active' : en ? 'missing' : 'off';
      const badge = en && filled ? '已就绪' : en ? '待配置' : '未启用';
      return `<div class="ch-pick" onclick="showChannelDetail('${id}')">
        <div class="ch-pick-info"><div class="ch-pick-name">${esc(s.name)}</div><div class="ch-pick-desc">${esc(s.description)}</div></div>
        <div class="ch-pick-right"><span class="badge ${status}">${badge}</span><span class="ch-arrow">›</span></div>
      </div>`;
    }).join('');
  } catch (e) { body.innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

// ══ Channel config — Step 2: detail ══
async function showChannelDetail(chId) {
  // Telegram 已登录 → 直接进操作页
  if (chId === 'telegram') {
    const accts = await fetch('/api/telegram/accounts').then(r=>r.json()).catch(()=>({accounts:[]}));
    const loggedIn = accts.accounts?.some(a => a.has_session && a.is_active);
    if (loggedIn) { showTgOps(accts.accounts[0]); return; }
  }
  showChannelConfig(chId);
}

function showChannelConfig(chId) {
  const s = _schema[chId], cfg = _cfgs[chId] || {}, en = cfg.enabled ?? false;
  document.getElementById('config-title').textContent = s.name;
  let html = `<div class="detail-header"><button class="btn-back" onclick="showChannelPicker()">‹</button><div class="detail-title">${esc(s.name)}</div></div>`;
  html += s.fields.map(f => renderField(chId, f, cfg[f.key] || f.default || '')).join('');
  if (chId === 'telegram') html += tgAccountsSection();
  html += `<div class="ch-footer-bar">
    <label class="toggle"><input type="checkbox" id="en-${chId}" ${en?'checked':''}><div class="toggle-track"></div><span class="toggle-label">启用</span></label>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="toast" id="toast-${chId}"></span>
      <button class="btn-save" onclick="saveChannel('${chId}')">保存</button>
    </div>
  </div>`;
  document.getElementById('config-body').innerHTML = html;
  if (chId === 'telegram') setTimeout(loadTgAccounts, 50);
}

function renderField(chId, f, val) {
  const id = `f-${chId}-${f.key}`, req = f.required ? '<span class="req">*</span>' : '';
  let inp;
  if (f.type === 'textarea') inp = `<textarea id="${id}" placeholder="${esc(f.placeholder||'')}" rows="3">${esc(val)}</textarea>`;
  else if (f.type === 'select') inp = `<select id="${id}">${(f.options||[]).map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  else if (f.type === 'password') inp = `<input type="password" id="${id}" value="${esc(val)}" placeholder="${esc(f.placeholder||'')}">`;
  else inp = `<input type="text" id="${id}" value="${esc(val)}" placeholder="${esc(f.placeholder||'')}">`;
  return `<div class="field-group"><div class="field-label">${esc(f.label)} ${req}</div>${inp}${f.help?`<div class="field-help">${esc(f.help)}</div>`:''}</div>`;
}

async function saveChannel(chId) {
  const toast = document.getElementById(`toast-${chId}`);
  const payload = { channel: chId, enabled: document.getElementById(`en-${chId}`).checked };
  document.querySelectorAll(`[id^="f-${chId}-"]`).forEach(el => { payload[el.id.replace(`f-${chId}-`, '')] = el.value.trim(); });
  try {
    const res = await fetch('/api/channels/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    if (res.ok) {
      toast.className='toast ok'; toast.textContent='✅ 已保存'; loadChannels();
      if (chId === 'telegram') {
        setTimeout(async () => {
          const accts = await fetch('/api/telegram/accounts').then(r=>r.json()).catch(()=>({accounts:[]}));
          const loggedIn = accts.accounts?.some(a => a.has_session && a.is_active);
          if (loggedIn) showTgOps(accts.accounts.find(a=>a.has_session));
        }, 600);
      }
    } else { const d=await res.json(); toast.className='toast err'; toast.textContent='❌ '+(d.detail||'失败'); }
  } catch(e) { toast.className='toast err'; toast.textContent='❌ '+e.message; }
}

// ══ Telegram accounts ══
function tgAccountsSection() {
  return `<div class="tg-section">
    <div class="tg-section-title">📱 Telegram 账号</div>
    <div id="tg-list"></div>
    <div class="add-acct-form">
      <input type="text" id="tg-label" placeholder="备注名">
      <input type="text" id="tg-phone" placeholder="+66...">
      <input type="text" id="tg-aid" placeholder="API ID">
      <input type="password" id="tg-ahash" placeholder="API Hash">
      <button class="btn-full" onclick="tgAdd()">添加账号</button>
    </div>
    <div class="toast" id="tg-toast" style="margin-top:8px"></div>
  </div>`;
}

async function loadTgAccounts() {
  const el = document.getElementById('tg-list');
  if (!el) return;
  try {
    const d = await fetch('/api/telegram/accounts').then(r=>r.json());
    if (!d.accounts.length) { el.innerHTML = '<div style="color:var(--text3);font-size:12px;margin-bottom:8px">暂无账号</div>'; return; }
    el.innerHTML = d.accounts.map(a => `
      <div class="acct-row" id="ar-${a.id}">
        <div class="acct-info"><span class="dot ${a.has_session?'g':'r'}"></span><div><div class="acct-name">${esc(a.label)}</div><div class="acct-phone">${esc(a.phone)} ${a.has_session?'· 已登录':''}</div></div></div>
        <div class="acct-btns">
          ${!a.has_session?`<button class="btn-login" onclick="tgToggleLogin(${a.id})">登录</button>`:''}
          <button class="btn-del" onclick="tgDel(${a.id})">删</button>
        </div>
      </div>
      <div id="lb-${a.id}" style="display:none" class="login-box">
        <div class="login-row"><button class="btn-code" onclick="tgSend(${a.id})">发送验证码</button><span class="toast" id="lt-${a.id}"></span></div>
        <div class="login-row" id="cr-${a.id}" style="display:none">
          <input type="text" id="code-${a.id}" placeholder="验证码">
          <input type="password" id="2fa-${a.id}" placeholder="两步验证" style="display:none">
          <button class="btn-code" onclick="tgVerify(${a.id})">验证</button>
        </div>
      </div>
    `).join('');
  } catch(e) { el.innerHTML = `<div style="color:var(--red);font-size:12px">${esc(e.message)}</div>`; }
}

async function tgAdd() {
  const label=v('tg-label'), phone=v('tg-phone'), api_id=v('tg-aid'), api_hash=v('tg-ahash'), t=document.getElementById('tg-toast');
  if (!label||!phone||!api_id||!api_hash){t.className='toast err';t.textContent='请填完所有字段';return;}
  try {
    const d = await fetch('/api/telegram/accounts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({label,phone,api_id,api_hash})}).then(r=>r.json());
    if (d.ok){t.className='toast ok';t.textContent='✅ '+d.message;['tg-label','tg-phone','tg-aid','tg-ahash'].forEach(i=>document.getElementById(i).value='');loadTgAccounts();}
    else{t.className='toast err';t.textContent='❌ '+(d.detail||'失败');}
  }catch(e){t.className='toast err';t.textContent='❌ '+e.message;}
}

async function tgDel(id){if(!confirm('确定删除？'))return;await fetch(`/api/telegram/accounts/${id}`,{method:'DELETE'});loadTgAccounts();}
function tgToggleLogin(id){const el=document.getElementById(`lb-${id}`);el.style.display=el.style.display==='none'?'block':'none';}

async function tgSend(id){
  const t=document.getElementById(`lt-${id}`);t.textContent='发送中...';
  try{const d=await fetch(`/api/telegram/accounts/${id}/send-code`,{method:'POST'}).then(r=>r.json());
    if(d.ok){t.className='toast ok';t.textContent=d.message;document.getElementById(`cr-${id}`).style.display='flex';}
    else{t.className='toast err';t.textContent='❌ '+(d.detail||'失败');}
  }catch(e){t.className='toast err';t.textContent='❌ '+e.message;}
}

async function tgVerify(id){
  const code=v(`code-${id}`), pw=v(`2fa-${id}`), t=document.getElementById(`lt-${id}`);
  if(!code){t.className='toast err';t.textContent='请输入验证码';return;}
  try{const d=await fetch(`/api/telegram/accounts/${id}/verify-code`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,password:pw})}).then(r=>r.json());
    if(d.ok){t.className='toast ok';t.textContent='✅ 登录成功';setTimeout(async()=>{const accts=await fetch('/api/telegram/accounts').then(r=>r.json());const a=accts.accounts?.find(x=>x.has_session);if(a)showTgOps(a);},500);}
    else if(d.need_2fa){document.getElementById(`2fa-${id}`).style.display='block';t.className='toast err';t.textContent='需要两步验证密码';}
    else{t.className='toast err';t.textContent='❌ '+(d.detail||'失败');}
  }catch(e){t.className='toast err';t.textContent='❌ '+e.message;}
}

// ══ Telegram 操作页 ══
let _tgAcct = null;
let _tgDialogs = [];

function showTgOps(acct) {
  _tgAcct = acct;
  document.getElementById('config-title').textContent = 'Telegram';
  renderTgOpsMain();
}

function renderTgOpsMain() {
  document.getElementById('config-body').innerHTML = `
    <div class="tg-ops-header">
      <div class="tg-ops-acct">
        <span class="dot g"></span>
        <div><div class="tg-ops-name">${esc(_tgAcct.label)}</div><div class="tg-ops-phone">${esc(_tgAcct.phone)}</div></div>
      </div>
      <button class="btn-config-sm" onclick="showChannelConfig('telegram')">⚙ 配置</button>
    </div>
    <div class="tg-search">
      <input id="tg-q" type="text" placeholder="搜 @用户名 或关键词..." inputmode="search">
      <button class="btn-search-go" onclick="tgSearch()">搜</button>
    </div>
    <div id="tg-sr" style="display:none;margin-bottom:10px"></div>
    <div class="tg-section-label">对话列表</div>
    <div id="tg-dialogs"><div class="center-spin"><div class="spin"></div></div></div>
  `;
  document.getElementById('tg-q').addEventListener('keydown', e => { if(e.key==='Enter') tgSearch(); });
  loadDialogs();
}

async function loadDialogs() {
  const el = document.getElementById('tg-dialogs');
  try {
    const d = await fetch(`/api/telegram/dialogs?limit=100&account_id=${_tgAcct.id}`).then(r=>r.json());
    _tgDialogs = d.dialogs || [];
    if (!_tgDialogs.length) { el.innerHTML = '<div class="empty">暂无对话</div>'; return; }
    el.innerHTML = _tgDialogs.map(dlg => dialogRow(dlg)).join('');
  } catch(e) { el.innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

function dialogRow(dlg) {
  const icon = dlg.type==='channel'?'📢':dlg.type==='group'?'👥':'👤';
  const typeLabel = dlg.type==='channel'?'频道':dlg.type==='group'?'群组':'私聊';
  const target = dlg.username || String(dlg.id);
  return `<div class="dialog-item" onclick="openChat('${esc(target)}','${esc(dlg.name)}')">
    <div class="dialog-avatar">${icon}</div>
    <div class="dialog-info">
      <div class="dialog-name">${esc(dlg.name)}</div>
      <div class="dialog-preview">${esc(dlg.last_message||'')}</div>
    </div>
    <div class="dialog-right">
      <span class="dialog-type">${typeLabel}</span>
      ${dlg.unread_count>0?`<span class="dialog-unread">${dlg.unread_count}</span>`:''}
    </div>
  </div>`;
}

async function tgSearch() {
  const q = v('tg-q');
  if (!q) return;
  const srEl = document.getElementById('tg-sr');
  srEl.style.display = 'block';
  srEl.innerHTML = '<div class="center-spin"><div class="spin"></div></div>';
  try {
    const d = await fetch(`/api/telegram/search/global?q=${encodeURIComponent(q)}&account_id=${_tgAcct.id}`).then(r=>r.json());
    const items = [
      ...(d.users||[]).map(u => {
        const name = [u.first_name,u.last_name].filter(Boolean).join(' ');
        const sub = (u.username?'@'+u.username:'') + (u.bot?' · Bot':'');
        return `<div class="sr-item">
          <div class="sr-avatar">${(name[0]||'?').toUpperCase()}</div>
          <div class="sr-info"><div class="sr-name">${esc(name)}</div><div class="sr-sub">${esc(sub)}</div></div>
          ${u.username?`<button class="btn-into" onclick="openChat('${esc(u.username)}','${esc(name)}')">进入</button>`:''}
        </div>`;
      }),
      ...(d.chats||[]).map(c => {
        const sub = (c.username?'@'+c.username:'')+(c.participants_count?' · '+c.participants_count+'人':'');
        return `<div class="sr-item">
          <div class="sr-avatar" style="background:var(--bg3);color:var(--text2);font-size:18px">${c.type==='channel'?'📢':'👥'}</div>
          <div class="sr-info"><div class="sr-name">${esc(c.title)}</div><div class="sr-sub">${esc(sub)}</div></div>
          ${c.username?`<button class="btn-into" onclick="openChat('${esc(c.username)}','${esc(c.title)}')">进入</button>`:''}
        </div>`;
      }),
    ];
    srEl.innerHTML = items.length
      ? `<div class="tg-section-label">搜索结果</div>${items.join('')}`
      : `<div style="font-size:13px;color:var(--text3);padding:8px 0">没有找到 "${esc(q)}"</div>`;
  } catch(e) { srEl.innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

// ── 消息视图 ──
let _chatMsgs = [];
let _chatTarget = '';

async function openChat(target, name) {
  _chatTarget = target;
  document.getElementById('config-title').textContent = name;
  document.getElementById('config-body').innerHTML = `
    <div class="chat-header">
      <button class="btn-back-chat" onclick="showTgOps(_tgAcct)">‹</button>
      <div class="chat-title">${esc(name)}</div>
    </div>
    <div class="chat-filter">
      <input type="text" id="chat-filter" placeholder="过滤关键词..." oninput="filterMsgs()">
      <button class="btn-filter" onclick="filterMsgs()">过滤</button>
      <button class="btn-ai" onclick="runAI()">🤖 AI分析</button>
    </div>
    <div id="chat-msgs"><div class="center-spin"><div class="spin"></div></div></div>
  `;
  try {
    const d = await fetch(`/api/telegram/messages?target=${encodeURIComponent(target)}&limit=100&account_id=${_tgAcct.id}`).then(r=>r.json());
    _chatMsgs = d.messages || [];
    renderMsgs(_chatMsgs);
  } catch(e) { document.getElementById('chat-msgs').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

function renderMsgs(msgs) {
  const el = document.getElementById('chat-msgs');
  if (!msgs.length) { el.innerHTML = '<div class="empty">暂无消息</div>'; return; }
  el.innerHTML = `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">${msgs.length} 条消息</div>`
    + msgs.map(m => msgItem(m)).join('');
}

function msgItem(m) {
  const s = m.sender || {};
  const hasText = !!m.text;
  const name = s.name || '';
  const at = s.username ? '@' + s.username : (s.id ? '#' + s.id : '');
  const initial = (name[0] || at[1] || '?').toUpperCase();

  let senderHtml = '';
  if (name || at) {
    const senderTarget = s.username || (s.id ? String(s.id) : '');
    const senderClick = senderTarget ? `onclick="openSenderProfile('${esc(senderTarget)}','${esc(name||at)}')"` : '';
    senderHtml = `<div class="msg-sender" ${senderClick}>
      <div class="sender-avatar">${initial}</div>
      <span class="sender-name">${esc(name)}</span>
      ${at ? `<span class="sender-at">${esc(at)}</span>` : ''}
    </div>`;
  }

  const contentHtml = hasText
    ? `<div class="msg-text">${esc(m.text)}</div>`
    : `<div class="msg-media">${esc(m.media_type || '📎 媒体')}</div>`;

  return `<div class="msg-item ${hasText?'':'media-only'}">${senderHtml}${contentHtml}</div>`;
}

function openSenderProfile(target, name) {
  openChat(target, name);
}

function filterMsgs() {
  const q = v('chat-filter').toLowerCase();
  if (!q) { renderMsgs(_chatMsgs); return; }
  renderMsgs(_chatMsgs.filter(m => m.text.toLowerCase().includes(q)));
}

async function runAI() {
  const btn = document.querySelector('.btn-ai');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  const q = v('chat-filter');
  const msgs = q ? _chatMsgs.filter(m=>m.text.toLowerCase().includes(q.toLowerCase())) : _chatMsgs;
  try {
    const cfg = await fetch('/api/channels/config').then(r=>r.json());
    const tgCfg = cfg.channels?.telegram || {};
    await fetch('/api/channels/config', {method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({channel:'telegram', enabled:true, sources:_chatTarget, llm_api_key:tgCfg.llm_api_key||''})});
    const res = await fetch('/api/search', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({keyword: q||_chatTarget, channel:'telegram'})}).then(r=>r.json());
    const el = document.getElementById('chat-msgs');
    if (!res.jobs?.length) {
      el.innerHTML = '<div class="empty">未提取到职位信息</div>'
        + `<div style="margin-top:10px">${msgs.map(m=>`<div class="msg-item">${esc(m.text)}</div>`).join('')}</div>`;
    } else {
      el.innerHTML = `<div style="color:var(--green);font-size:13px;margin-bottom:10px">✅ 提取到 ${res.jobs.length} 条职位</div>`
        + res.jobs.map(j=>jobCard(j)).join('');
    }
  } catch(e) { document.getElementById('chat-msgs').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
  finally { btn.disabled=false; btn.textContent='🤖 AI分析'; }
}

// ══ Helpers ══
function v(id){return document.getElementById(id)?.value?.trim()||'';}
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;}
document.getElementById('keyword').addEventListener('keydown', e=>{if(e.key==='Enter')doSearch();});
</script>
